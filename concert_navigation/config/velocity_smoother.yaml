velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    enable_stamped_cmd_vel: false
    feedback: "OPEN_LOOP"              # safer default; switch to CLOSED_LOOP once odom validated
    max_velocity: [0.5, 0.5, 1.9]
    min_velocity: [-0.5, -0.5, -1.9]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: "/base_link/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
