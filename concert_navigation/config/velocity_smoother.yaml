velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "CLOSED_LOOP"            # Concert has reliable wheel+IMU odom → use real velocity feedback
    max_velocity: [0.5, 0.5, 1.9]
    min_velocity: [-0.5, -0.5, -1.9]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: "/base_link/odom"
    odom_duration: 0.1
    deadband_velocity: [0.05, 0.05, 0.05]   # below stiction floor → set to zero
    velocity_timeout: 1.0
