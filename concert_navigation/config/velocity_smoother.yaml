velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 0.5] # [max linear X, max linear Y, max angular Z] max_velocity is max angular velocity in rad/s.
    min_velocity: [-0.5, 0.0, -2.0]
    max_accel: [2.5, 0.0, 0.5] # [accel linear X, accel linear Y, accel angular Z]
    max_decel: [-2.5, 0.0, -0.5] # [decel linear X, decel linear Y, decel angular Z]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0