velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    enable_stamped_cmd_vel: false
    feedback: "CLOSED_LOOP"
    max_velocity: [0.5, 0.5, 0.8]
    min_velocity: [-0.5, -0.5, -0.8]
    max_accel: [2.0, 2.0, 1.2]
    max_decel: [-2.0, -2.0, -1.2]
    odom_topic: "/base_link/odom"
    odom_duration: 0.1
    deadband_velocity: [0.05, 0.05, 0.05]
    velocity_timeout: 1.0
