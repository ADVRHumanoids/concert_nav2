collision_monitor:
  ros__parameters:
    base_frame_id: "base_link_projected"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "omnisteering/cmd_vel"
    enable_stamped_cmd_vel: false
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    # Layered safety: stop -> slowdown -> approach (footprint-aware time-to-collision)
    polygons: ["PolygonStop", "PolygonSlow", "FootprintApproach"]
    PolygonStop:
      type: "polygon"
      points: "[[0.65, 0.45], [0.65, -0.45], [-0.65, -0.45], [-0.65, 0.45]]"
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    PolygonSlow:
      type: "polygon"
      points: "[[0.85, 0.55], [0.85, -0.55], [-0.85, -0.55], [-0.85, 0.55]]"
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.4              # 40% speed when obstacle in slow zone
      visualize: True
      polygon_pub_topic: "polygon_slow"
      enabled: True
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: True
